[build]
  publish = "."
  command = "npm install"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # Keep these packages un-bundled so they can detect the Netlify runtime context
  external_node_modules = ["@netlify/blobs", "bcryptjs"]

[[edge_functions]]
  path = "/admin"
  function = "admin-auth"

[[edge_functions]]
  path = "/admin/*"
  function = "admin-auth"

[[redirects]]
  from = "/api/admin/login"
  to = "/.netlify/functions/admin-login"
  status = 200

[[redirects]]
  from = "/api/admin/logout"
  to = "/.netlify/functions/admin-logout"
  status = 200
