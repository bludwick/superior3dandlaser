[build]
  publish = "."
  command = "npm install && cd customer && npm install && npm run build"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # Keep these packages un-bundled so they load correctly at runtime
  # (stripe v17 ESM, busboy streams, nodemailer SMTP all have bundling edge cases)
  external_node_modules = ["@netlify/blobs", "bcryptjs", "stripe", "busboy", "nodemailer", "xml2js"]

[[edge_functions]]
  path = "/admin"
  function = "admin-auth"

[[edge_functions]]
  path = "/admin/*"
  function = "admin-auth"

[[redirects]]
  from = "/api/login"
  to = "/.netlify/functions/smart-login"
  status = 200

[[redirects]]
  from = "/api/admin/login"
  to = "/.netlify/functions/admin-login"
  status = 200

[[redirects]]
  from = "/api/admin/logout"
  to = "/.netlify/functions/admin-logout"
  status = 200

[[redirects]]
  from = "/api/admin/orders"
  to = "/.netlify/functions/list-orders"
  status = 200

[[redirects]]
  from = "/api/admin/orders/*"
  to = "/.netlify/functions/list-orders"
  status = 200

[[redirects]]
  from = "/api/admin/jobs"
