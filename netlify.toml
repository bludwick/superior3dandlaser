[build]
  publish = "."
  command = "npm install"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # Keep these packages un-bundled so they detect the Netlify runtime context correctly
  external_node_modules = ["@netlify/blobs", "bcryptjs"]

[[edge_functions]]
  path = "/admin"
  function = "admin-auth"

[[edge_functions]]
  path = "/admin/*"
  function = "admin-auth"

[[redirects]]
  from = "/api/admin/login"
  to = "/.netlify/functions/admin-login"
  status = 200

[[redirects]]
  from = "/api/admin/logout"
  to = "/.netlify/functions/admin-logout"
  status = 200

[[redirects]]
  from = "/api/admin/orders"
  to = "/.netlify/functions/list-orders"
  status = 200

[[redirects]]
  from = "/api/admin/orders/*"
  to = "/.netlify/functions/list-orders"
  status = 200

[[redirects]]
  from = "/api/admin/jobs"
  to = "/.netlify/functions/manage-jobs"
  status = 200

[[redirects]]
  from = "/api/admin/jobs/*"
  to = "/.netlify/functions/manage-jobs"
  status = 200

[[redirects]]
  from = "/api/admin/materials"
  to = "/.netlify/functions/manage-materials"
  status = 200

[[redirects]]
  from = "/api/materials"
  to = "/.netlify/functions/manage-materials"
  status = 200

[[redirects]]
  from = "/api/invoice"
  to = "/.netlify/functions/get-invoice"
  status = 200

[[redirects]]
  from = "/api/checkout"
  to = "/.netlify/functions/create-checkout"
  status = 200

[[redirects]]
  from = "/api/admin/files"
  to = "/.netlify/functions/download-file"
  status = 200

[[redirects]]
  from = "/api/admin/upload"
  to = "/.netlify/functions/upload-file"
  status = 200

[[redirects]]
  from = "/api/calculate-tax"
  to = "/.netlify/functions/calculate-tax"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/customquote"
  status = 301
