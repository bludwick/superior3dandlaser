<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Sign In – Superior 3D and Laser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #ffffff;
    --bg-card:  #f8f8f8;
    --border:   #e0e0e0;
    --accent:   #b91c1c;
    --text:     #111111;
    --muted:    #555555;
    --radius:   10px;
    --font:     'Inter', 'Segoe UI', system-ui, sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: .18;
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 40px 36px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 4px 32px rgba(0,0,0,.07);
  }

  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    margin-bottom: 32px;
    text-align: center;
  }

  .brand-tag {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .brand h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -.02em;
    line-height: 1.2;
  }

  .brand h1 span { color: var(--accent); }

  .brand .subtitle {
    font-size: 13px;
    color: var(--muted);
    font-weight: 500;
    margin-top: 2px;
  }

  .divider {
    width: 40px;
    height: 2px;
    background: var(--accent);
    margin: 0 auto 28px;
    border-radius: 2px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 16px;
  }

  label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .04em;
    text-transform: uppercase;
    color: var(--muted);
  }

  input {
    font-family: var(--font);
    font-size: 14px;
    font-weight: 500;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 11px 14px;
    color: var(--text);
    outline: none;
    transition: border-color .15s;
    width: 100%;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(185,28,28,.1);
  }

  .error-box {
    display: none;
    background: rgba(185,28,28,.08);
    border: 1px solid rgba(185,28,28,.25);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    margin-bottom: 16px;
    text-align: center;
  }

  .error-box.visible { display: block; }

  .btn {
    width: 100%;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 700;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 13px;
    cursor: pointer;
    letter-spacing: .02em;
    transition: background .15s, opacity .15s;
    margin-top: 6px;
  }

  .btn:hover:not(:disabled) { background: #991b1b; }
  .btn:disabled { opacity: .6; cursor: not-allowed; }
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-tag">Superior 3D and Laser</div>
    <h1>Admin <span>Sign In</span></h1>
    <div class="subtitle">Restricted access</div>
  </div>
  <div class="divider"></div>

  <form id="loginForm" onsubmit="handleSubmit(event)">
    <div class="error-box" id="errorBox">Invalid email or password</div>

    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" autocomplete="username" required placeholder="you@example.com">
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="••••••••">
    </div>

    <button type="submit" class="btn" id="submitBtn">Sign In</button>
  </form>
</div>

<script>
async function handleSubmit(e) {
  e.preventDefault();

  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('submitBtn');
  const errorBox = document.getElementById('errorBox');

  errorBox.classList.remove('visible');
  btn.disabled  = true;
  btn.textContent = 'Signing in…';

  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });

    if (res.ok) {
      window.location.replace('/admin/');
    } else {
      errorBox.classList.add('visible');
      document.getElementById('password').value = '';
    }
  } catch {
    errorBox.classList.add('visible');
  }

  btn.disabled    = false;
  btn.textContent = 'Sign In';
}
</script>
</body>
</html>
