<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Superior 3D and Laser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:       #ffffff;
    --bg-card:  #f8f8f8;
    --bg-light: #f1f1f1;
    --border:   #e0e0e0;
    --accent:   #b91c1c;
    --text:     #111111;
    --muted:    #555555;
    --font:     'Inter', 'Segoe UI', system-ui, sans-serif;
  }
  html, body { height: 100%; }
  body {
    font-family: var(--font);
    background: var(--bg-light);
    color: var(--text);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px; opacity: .18; pointer-events: none;
  }
  .card {
    position: relative;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08);
    padding: 44px 40px 40px; width: 100%; max-width: 420px; margin: 20px;
  }
  .logo-area { display: flex; flex-direction: column; gap: 4px; margin-bottom: 32px; }
  .logo-tag { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: .12em; text-transform: uppercase; }
  .logo-name { font-size: 20px; font-weight: 900; line-height: 1.1; letter-spacing: -.02em; }
  .logo-name span { color: var(--accent); }
  .admin-badge {
    display: inline-flex; align-items: center; gap: 5px; margin-top: 6px;
    font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    color: var(--accent); background: rgba(185,28,28,.08); border: 1px solid rgba(185,28,28,.18);
    border-radius: 5px; padding: 3px 8px; width: fit-content;
  }
  h2 { font-size: clamp(1.75rem, 3.5vw, 2.5rem); font-weight: 800; letter-spacing: -.01em; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  label { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: #777; }
  .input-wrap { position: relative; display: flex; align-items: center; }
  input {
    width: 100%; padding: 10px 42px 10px 13px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: var(--font); font-size: 14px;
    outline: none; transition: border-color .2s, box-shadow .2s;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(185,28,28,.10); }
  .pw-toggle {
    position: absolute; right: 10px; background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 14px; padding: 2px 4px; line-height: 1; transition: color .15s;
  }
  .pw-toggle:hover { color: var(--text); }
  .btn {
    width: 100%; padding: 12px; background: var(--accent); color: #fff;
    border: none; border-radius: 8px; font-family: var(--font); font-size: 14px;
    font-weight: 700; cursor: pointer; letter-spacing: .02em; margin-top: 8px;
    transition: background .2s, transform .15s, box-shadow .2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn:hover:not(:disabled) { background: #dc2626; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(185,28,28,.3); }
  .btn:disabled { opacity: .6; cursor: not-allowed; }
  .error-box {
    display: none; background: rgba(220,38,38,.05); border: 1px solid rgba(220,38,38,.25);
    border-radius: 8px; padding: 11px 14px; font-size: 13px; color: #dc2626;
    font-weight: 600; margin-top: 16px;
  }
  .error-box.show { display: block; }
  .back-link { display: block; text-align: center; margin-top: 22px; font-size: 12px; color: var(--muted); text-decoration: none; }
  .back-link:hover { color: var(--accent); }
  .spinner {
    width: 16px; height: 16px; border: 2.5px solid rgba(255,255,255,.4);
    border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; display: none;
  }
  .btn.loading .spinner { display: block; }
  .btn.loading .btn-label { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── OTP step ── */
  #otpStep { display: none; }
  .otp-sent {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 11px 14px; margin-bottom: 22px;
    font-size: 13px; color: var(--muted);
  }
  .otp-sent-icon { font-size: 18px; flex-shrink: 0; }
  #otpInput {
    font-size: 28px; font-weight: 800; letter-spacing: 14px; text-align: center;
    padding: 14px 13px; font-variant-numeric: tabular-nums;
  }
  .otp-actions {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 16px; font-size: 12px;
  }
  .otp-back { color: var(--muted); cursor: pointer; background: none; border: none; font-family: var(--font); font-size: 12px; padding: 0; }
  .otp-back:hover { color: var(--accent); }
  .otp-resend { color: var(--accent); cursor: pointer; background: none; border: none; font-family: var(--font); font-size: 12px; font-weight: 600; padding: 0; }
  .otp-resend:disabled { color: var(--muted); cursor: default; }
  .success-box {
    display: none; background: rgba(21,128,61,.05); border: 1px solid rgba(21,128,61,.25);
    border-radius: 8px; padding: 11px 14px; font-size: 13px; color: #15803d;
    font-weight: 600; margin-top: 16px;
  }
  .success-box.show { display: block; }
</style>
</head>
<body>
<div class="card">
  <div class="logo-area">
    <span class="logo-tag">Superior 3D and Laser</span>
    <div class="logo-name">Admin <span>Portal</span></div>
    <span class="admin-badge">🔐 Restricted Access</span>
  </div>

  <!-- ── Step 1: Password ── -->
  <div id="step1">
    <h2>Sign In</h2>
    <p class="subtitle">Enter your admin credentials to continue.</p>

    <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
      <div class="field">
        <label for="email">Email Address</label>
        <div class="input-wrap">
          <input type="email" id="email" name="email" placeholder="admin@example.com" autocomplete="email" required>
        </div>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password" placeholder="••••••••••" autocomplete="current-password" required>
          <button type="button" class="pw-toggle" onclick="togglePw()" title="Show / hide password">👁</button>
        </div>
      </div>
      <button type="submit" class="btn" id="submitBtn">
        <span class="btn-label">Sign In →</span>
        <span class="spinner"></span>
      </button>
    </form>

    <div class="error-box" id="errorBox1"></div>
  </div>

  <!-- ── Step 2: OTP ── -->
  <div id="otpStep">
    <h2>Verify</h2>
    <p class="subtitle">Two-step verification</p>

    <div class="otp-sent">
      <span class="otp-sent-icon">📧</span>
      <span>Code sent to <strong id="otpEmailDisplay"></strong>. Check your inbox.</span>
    </div>

    <form id="otpForm" onsubmit="handleVerify(event)" novalidate>
      <div class="field">
        <label for="otpInput">6-Digit Code</label>
        <div class="input-wrap">
          <input type="text" id="otpInput" name="otp" inputmode="numeric" pattern="\d{6}"
                 maxlength="6" placeholder="000000" autocomplete="one-time-code" required>
        </div>
      </div>
      <button type="submit" class="btn" id="verifyBtn">
        <span class="btn-label">Verify →</span>
        <span class="spinner"></span>
      </button>
    </form>

    <div class="otp-actions">
      <button type="button" class="otp-back" onclick="backToPassword()">← Back</button>
      <button type="button" class="otp-resend" id="resendBtn" onclick="handleResend()">Resend code</button>
    </div>

    <div class="error-box" id="errorBox2"></div>
    <div class="success-box" id="successBox2"></div>
  </div>

  <a href="/" class="back-link">← Back to site</a>
</div>

<script>
  var _pendingToken = null;
  var _resendTimer  = null;

  function maskEmail(email) {
    var parts = email.split('@');
    return parts[0].slice(0, 2) + '***@' + parts[1];
  }

  function togglePw() {
    var inp = document.getElementById('password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  function showError(boxId, msg) {
    var el = document.getElementById(boxId);
    el.textContent = msg;
    el.classList.add('show');
  }
  function clearMessages() {
    ['errorBox1','errorBox2','successBox2'].forEach(function(id) {
      var el = document.getElementById(id);
      el.textContent = '';
      el.classList.remove('show');
    });
  }

  function setLoading(btnId, on) {
    var btn = document.getElementById(btnId);
    btn.disabled = on;
    btn.classList.toggle('loading', on);
  }

  // ── Step 1: password submission ────────────────────────────────────────────
  async function handleLogin(e) {
    e.preventDefault();
    clearMessages();
    var email    = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;

    if (!email || !password) {
      showError('errorBox1', 'Please enter your email and password.');
      return;
    }

    setLoading('submitBtn', true);
    try {
      var res  = await fetch('/api/admin/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email, password }),
      });
      var data = await res.json().catch(function() { return {}; });

      if (res.ok && data.step === 'otp') {
        _pendingToken = data.pendingToken;
        document.getElementById('otpEmailDisplay').textContent = maskEmail(email);
        document.getElementById('step1').style.display  = 'none';
        document.getElementById('otpStep').style.display = 'block';
        document.getElementById('otpInput').focus();
        startResendCooldown(30);
      } else if (res.status === 429) {
        showError('errorBox1', 'Too many failed attempts. Please wait 15 minutes and try again.');
      } else {
        showError('errorBox1', data.error || 'Invalid email or password.');
      }
    } catch {
      showError('errorBox1', 'Network error — check your connection and try again.');
    } finally {
      setLoading('submitBtn', false);
    }
  }

  // ── Step 2: OTP verification ───────────────────────────────────────────────
  async function handleVerify(e) {
    e.preventDefault();
    clearMessages();
    var otp = document.getElementById('otpInput').value.trim();

    if (!/^\d{6}$/.test(otp)) {
      showError('errorBox2', 'Please enter the 6-digit code from your email.');
      return;
    }

    setLoading('verifyBtn', true);
    try {
      var res  = await fetch('/api/admin/verify-otp', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ otp, pendingToken: _pendingToken }),
      });
      var data = await res.json().catch(function() { return {}; });

      if (res.ok && data.ok) {
        window.location.href = '/admin/';
      } else if (res.status === 401 && (data.error || '').includes('sign in again')) {
        // Session expired or too many attempts — force back to password step
        showError('errorBox2', data.error);
        setTimeout(backToPassword, 2500);
      } else {
        showError('errorBox2', data.error || 'Incorrect code. Please try again.');
      }
    } catch {
      showError('errorBox2', 'Network error — check your connection and try again.');
    } finally {
      setLoading('verifyBtn', false);
    }
  }

  // ── Resend code ────────────────────────────────────────────────────────────
  async function handleResend() {
    clearMessages();
    var resendBtn = document.getElementById('resendBtn');
    resendBtn.disabled = true;

    try {
      var res  = await fetch('/api/admin/verify-otp', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ resend: true, pendingToken: _pendingToken }),
      });
      var data = await res.json().catch(function() { return {}; });

      if (res.ok && data.pendingToken) {
        _pendingToken = data.pendingToken;
        document.getElementById('otpInput').value = '';
        document.getElementById('successBox2').textContent = 'New code sent. Check your inbox.';
        document.getElementById('successBox2').classList.add('show');
        startResendCooldown(60);
      } else {
        showError('errorBox2', data.error || 'Failed to resend. Please try again.');
        resendBtn.disabled = false;
      }
    } catch {
      showError('errorBox2', 'Network error — could not resend code.');
      resendBtn.disabled = false;
    }
  }

  function startResendCooldown(seconds) {
    var resendBtn = document.getElementById('resendBtn');
    resendBtn.disabled = true;
    var remaining = seconds;
    resendBtn.textContent = 'Resend in ' + remaining + 's';
    clearInterval(_resendTimer);
    _resendTimer = setInterval(function() {
      remaining -= 1;
      if (remaining <= 0) {
        clearInterval(_resendTimer);
        resendBtn.disabled = false;
        resendBtn.textContent = 'Resend code';
      } else {
        resendBtn.textContent = 'Resend in ' + remaining + 's';
      }
    }, 1000);
  }

  // ── Back to password step ──────────────────────────────────────────────────
  function backToPassword() {
    clearMessages();
    clearInterval(_resendTimer);
    _pendingToken = null;
    document.getElementById('otpInput').value   = '';
    document.getElementById('otpStep').style.display = 'none';
    document.getElementById('step1').style.display   = 'block';
    document.getElementById('password').value   = '';
    document.getElementById('email').focus();
  }
</script>
</body>
</html>
