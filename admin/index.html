<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin – Superior 3D and Laser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #ffffff;
    --bg-card:  #f8f8f8;
    --bg-light: #f1f1f1;
    --border:   #e0e0e0;
    --accent:   #b91c1c;
    --text:     #111111;
    --muted:    #555555;
    --radius:   10px;
    --font:     'Inter', 'Segoe UI', system-ui, sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: .18;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 40px;
    gap: 16px;
    flex-wrap: wrap;
  }

  .logo-area { display: flex; flex-direction: column; gap: 4px; }

  .brand-tag {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--accent);
  }

  h1 {
    font-size: clamp(22px, 4vw, 32px);
    font-weight: 800;
    letter-spacing: -.02em;
  }

  h1 span { color: var(--accent); }

  /* Logout button */
  .btn-logout {
    font-family: var(--font);
    font-size: 13px;
    font-weight: 700;
    background: transparent;
    color: var(--accent);
    border: 1.5px solid var(--accent);
    border-radius: var(--radius);
    padding: 9px 18px;
    cursor: pointer;
    letter-spacing: .02em;
    transition: background .15s, color .15s;
    white-space: nowrap;
  }

  .btn-logout:hover { background: var(--accent); color: #fff; }

  /* Cards */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    text-decoration: none;
    color: inherit;
    transition: border-color .15s, box-shadow .15s;
  }

  a.card:hover {
    border-color: var(--accent);
    box-shadow: 0 4px 16px rgba(185,28,28,.08);
  }

  .card-icon { font-size: 28px; line-height: 1; }

  .card-title {
    font-size: 15px;
    font-weight: 700;
    margin-top: 4px;
  }

  .card-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* Divider */
  .section-label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 32px 0 12px;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo-area">
      <div class="brand-tag">Superior 3D and Laser</div>
      <h1>Admin <span>Panel</span></h1>
    </div>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </header>

  <div class="section-label">Tools</div>
  <div class="card-grid">
    <a class="card" href="/3dprintingquotecalculator.html">
      <div class="card-icon">🖨️</div>
      <div class="card-title">Instant Quote Calculator</div>
      <div class="card-desc">Configure materials, pricing, and settings for the customer-facing quote tool.</div>
    </a>
  </div>
</div>

<script>
async function logout() {
  try {
    await fetch('/api/admin/logout', { method: 'POST' });
  } catch { /* ignore */ }
  window.location.replace('/admin/login.html');
}
</script>
</body>
</html>
