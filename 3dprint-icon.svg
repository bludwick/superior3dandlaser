<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 110" fill="none" stroke="#111111" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Nozzle / extruder head: flat top, vertical sides, angled to tip -->
  <path d="M28,4 H72 V30 L50,46 L28,30 Z"/>
  <!-- Two internal filament channels -->
  <line x1="41" y1="9" x2="41" y2="28"/>
  <line x1="59" y1="9" x2="59" y2="28"/>
  <!-- Meander path: nozzle tip → 3 FDM layer passes with rounded U-turns -->
  <path d="M50,46 Q66,60 86,60 L14,60 A8,8 0 0,0 14,76 L86,76 A8,8 0 0,1 86,92 L14,92"/>
  <!-- Print bed baseline -->
  <line x1="5" y1="105" x2="95" y2="105"/>
</svg>
