<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Superior 3D and Laser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:       #ffffff;
    --bg-card:  #f8f8f8;
    --bg-light: #f1f1f1;
    --border:   #e0e0e0;
    --accent:   #b91c1c;
    --text:     #111111;
    --muted:    #555555;
    --font:     'Inter', 'Segoe UI', system-ui, sans-serif;
  }
  html, body { height: 100%; }
  body {
    font-family: var(--font);
    background: var(--bg-light);
    color: var(--text);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px; opacity: .18; pointer-events: none;
  }
  .card {
    position: relative;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08);
    width: 100%; max-width: 420px; margin: 20px;
    overflow: hidden;
  }
  .logo-area {
    display: flex; flex-direction: column; gap: 4px;
    padding: 36px 40px 24px;
    border-bottom: 1px solid var(--border);
  }
  .logo-tag { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: .12em; text-transform: uppercase; }
  .logo-name { font-size: 20px; font-weight: 900; line-height: 1.1; letter-spacing: -.02em; }
  .logo-name span { color: var(--accent); }

  /* Tabs */
  .tabs { display: flex; border-bottom: 1px solid var(--border); }
  .tab {
    flex: 1; padding: 14px 0; font-size: 13px; font-weight: 600;
    background: none; border: none; cursor: pointer; letter-spacing: .01em;
    color: var(--muted); border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s, background .15s;
    margin-bottom: -1px;
  }
  .tab:hover { color: var(--text); background: var(--bg-card); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--bg); }

  /* Form panels */
  .panel { display: none; padding: 28px 40px 36px; }
  .panel.active { display: block; }

  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  label { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: #777; }
  .input-wrap { position: relative; display: flex; align-items: center; }
  input {
    width: 100%; padding: 10px 13px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: var(--font); font-size: 14px;
    outline: none; transition: border-color .2s, box-shadow .2s;
  }
  input.pw-input { padding-right: 42px; }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(185,28,28,.10); }
  .pw-toggle {
    position: absolute; right: 10px; background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 14px; padding: 2px 4px; line-height: 1; transition: color .15s;
  }
  .pw-toggle:hover { color: var(--text); }

  .btn {
    width: 100%; padding: 12px; background: var(--accent); color: #fff;
    border: none; border-radius: 8px; font-family: var(--font); font-size: 14px;
    font-weight: 700; cursor: pointer; letter-spacing: .02em; margin-top: 8px;
    transition: background .2s, transform .15s, box-shadow .2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn:hover:not(:disabled) { background: #dc2626; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(185,28,28,.3); }
  .btn:disabled { opacity: .6; cursor: not-allowed; }

  .error-box {
    display: none; background: rgba(220,38,38,.05); border: 1px solid rgba(220,38,38,.25);
    border-radius: 8px; padding: 11px 14px; font-size: 13px; color: #dc2626;
    font-weight: 600; margin-top: 16px;
  }
  .error-box.show { display: block; }

  .spinner {
    width: 16px; height: 16px; border: 2.5px solid rgba(255,255,255,.4);
    border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; display: none;
  }
  .btn.loading .spinner { display: block; }
  .btn.loading .btn-label { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .back-link { display: block; text-align: center; padding: 0 40px 24px; font-size: 12px; color: var(--muted); text-decoration: none; }
  .back-link:hover { color: var(--accent); }
</style>
</head>
<body>
<div class="card">
  <div class="logo-area">
    <span class="logo-tag">Superior 3D and Laser</span>
    <div class="logo-name">Customer <span>Portal</span></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('signin')">Sign In</button>
    <button class="tab" onclick="switchTab('create')">Create Account</button>
  </div>

  <!-- Sign In panel -->
  <div class="panel active" id="panel-signin">
    <form id="signinForm" onsubmit="handleSignIn(event)" novalidate>
      <div class="field">
        <label for="si-email">Email Address</label>
        <input type="email" id="si-email" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="si-password">Password</label>
        <div class="input-wrap">
          <input type="password" id="si-password" class="pw-input" placeholder="••••••••••" autocomplete="current-password" required>
          <button type="button" class="pw-toggle" onclick="togglePw('si-password')" title="Show / hide password">👁</button>
        </div>
      </div>
      <button type="submit" class="btn" id="siBtn">
        <span class="btn-label">Sign In →</span>
        <span class="spinner"></span>
      </button>
    </form>
    <div class="error-box" id="si-error"></div>
  </div>

  <!-- Create Account panel -->
  <div class="panel" id="panel-create">
    <form id="createForm" onsubmit="handleCreate(event)" novalidate>
      <div class="field">
        <label for="ca-name">Full Name</label>
        <input type="text" id="ca-name" placeholder="Jane Smith" autocomplete="name" required>
      </div>
      <div class="field">
        <label for="ca-email">Email Address</label>
        <input type="email" id="ca-email" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="ca-password">Password</label>
        <div class="input-wrap">
          <input type="password" id="ca-password" class="pw-input" placeholder="At least 8 characters" autocomplete="new-password" required>
          <button type="button" class="pw-toggle" onclick="togglePw('ca-password')" title="Show / hide password">👁</button>
        </div>
      </div>
      <div class="field">
        <label for="ca-confirm">Confirm Password</label>
        <div class="input-wrap">
          <input type="password" id="ca-confirm" class="pw-input" placeholder="••••••••••" autocomplete="new-password" required>
          <button type="button" class="pw-toggle" onclick="togglePw('ca-confirm')" title="Show / hide password">👁</button>
        </div>
      </div>
      <button type="submit" class="btn" id="caBtn">
        <span class="btn-label">Create Account →</span>
        <span class="spinner"></span>
      </button>
    </form>
    <div class="error-box" id="ca-error"></div>
  </div>

  <a href="/" class="back-link">← Back to site</a>
</div>

<script>
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) =>
      t.classList.toggle('active', (i === 0) === (tab === 'signin'))
    );
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
    document.getElementById('si-error').classList.remove('show');
    document.getElementById('ca-error').classList.remove('show');
  }

  function togglePw(id) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  async function handleSignIn(e) {
    e.preventDefault();
    const btn   = document.getElementById('siBtn');
    const errEl = document.getElementById('si-error');
    const email    = document.getElementById('si-email').value.trim();
    const password = document.getElementById('si-password').value;

    errEl.classList.remove('show');
    btn.classList.add('loading');
    btn.disabled = true;

    try {
      const res  = await fetch('/api/customer/login', {
        method: 'POST', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json().catch(() => ({}));

      if (res.ok) {
        window.location.href = '/portal/';
      } else if (res.status === 429) {
        errEl.textContent = 'Too many attempts. Please wait 15 minutes and try again.';
        errEl.classList.add('show');
      } else {
        errEl.textContent = data.error || 'Invalid email or password.';
        errEl.classList.add('show');
      }
    } catch {
      errEl.textContent = 'Network error — check your connection and try again.';
      errEl.classList.add('show');
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  async function handleCreate(e) {
    e.preventDefault();
    const btn   = document.getElementById('caBtn');
    const errEl = document.getElementById('ca-error');
    const name     = document.getElementById('ca-name').value.trim();
    const email    = document.getElementById('ca-email').value.trim();
    const password = document.getElementById('ca-password').value;
    const confirm  = document.getElementById('ca-confirm').value;

    errEl.classList.remove('show');

    if (password !== confirm) {
      errEl.textContent = 'Passwords do not match.';
      errEl.classList.add('show');
      return;
    }
    if (password.length < 8) {
      errEl.textContent = 'Password must be at least 8 characters.';
      errEl.classList.add('show');
      return;
    }

    btn.classList.add('loading');
    btn.disabled = true;

    try {
      const res  = await fetch('/api/customer/register', {
        method: 'POST', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password }),
      });
      const data = await res.json().catch(() => ({}));

      if (res.ok) {
        window.location.href = '/portal/';
      } else {
        errEl.textContent = data.error || 'Registration failed. Please try again.';
        errEl.classList.add('show');
      }
    } catch {
      errEl.textContent = 'Network error — check your connection and try again.';
      errEl.classList.add('show');
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
